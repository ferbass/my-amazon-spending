# Category rules for the dashboard.
#
# A product is matched against each category in the order below; the FIRST hit
# wins. Put narrow/specific categories above broad ones (e.g. "Kindle Devices"
# above "Books" so the e-reader doesn't land in Books).
#
# Each keyword is a case-insensitive substring matched against the product
# name. Keywords may contain Japanese characters or English — mix freely.
# Edit, add, or reorder categories to match your purchase history.

